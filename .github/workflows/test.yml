name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 24.x
        id: node-test
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:integration
