name: Deploy Code

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-dev-state
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Deployment topology — declared, not defaulted. See ADR 0004.
      TF_VAR_node_env: production
      TF_VAR_app_env: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Lambda functions
        run: bash terraform/build.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: Cache Terraform
        uses: actions/cache@v5
        with:
          path: |
            ~/.terraform.d/plugin-cache
            terraform/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=backend-dev.hcl

      - name: Terraform plan
        id: plan
        working-directory: terraform
        run: |
          set +e
          terraform plan -input=false -lock-timeout=2m -detailed-exitcode
          PLAN_EXIT=$?
          set -e
          echo "exitcode=$PLAN_EXIT" >> "$GITHUB_OUTPUT"
          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "No changes detected."
          elif [ "$PLAN_EXIT" -eq 2 ]; then
            echo "Changes detected. Terraform apply will run."
          else
            echo "::error::Terraform plan failed with exit code $PLAN_EXIT"
          fi

      - name: Check for plan failure
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        run: |
          echo "Terraform plan failed with exit code ${{ steps.plan.outputs.exitcode }}"
          exit 1

      - name: Terraform apply
        if: steps.plan.outputs.exitcode == '2'
        working-directory: terraform
        run: terraform apply -input=false -auto-approve -lock-timeout=2m

      - name: Resolve static asset bucket
        id: static-assets
        working-directory: terraform
        run: |
          set -e
          BUCKET=$(terraform output -raw s3_bucket_name 2>/dev/null || true)
          if [ -z "$BUCKET" ]; then
            echo "::error::Terraform output 's3_bucket_name' is empty or not defined"
            echo "Available outputs:"
            terraform output || true
            exit 1
          fi
          echo "Resolved static asset bucket: $BUCKET"
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Upload pay page static assets
        run: |
          aws s3 sync src/static/html s3://${{ steps.static-assets.outputs.bucket }}/html --delete
          aws s3 sync src/static/wsdl s3://${{ steps.static-assets.outputs.bucket }}/wsdl --delete
