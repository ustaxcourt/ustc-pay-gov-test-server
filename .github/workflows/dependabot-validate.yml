name: Dependabot Validate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests_only:
    if: ${{ github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'dependabot/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build server
        run: npm run build

      - name: Create .env for integration tests
        run: |
          cat > .env <<'EOF'
          BASE_URL=http://localhost:3366
          ACCESS_TOKEN=asdf123
          PORT=3366
          NODE_ENV=local
          EOF

      - name: Start server in background
        run: |
          node dist/server.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS -H "authentication: Bearer asdf123" http://localhost:3366/wsdl > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to become ready within 30s"
          exit 1

      - name: Run integration tests
        run: npm run test:integration

      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ] && kill -0 "$SERVER_PID" 2>/dev/null; then
            kill "$SERVER_PID" || true
          fi
