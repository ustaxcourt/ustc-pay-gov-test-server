name: PR Validate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    if: ${{ github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'dependabot/') }}

    concurrency:
      group: terraform-dev-state
      cancel-in-progress: true

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Lint deploy workflow
        run: |
          # Guard: every run block that uses -detailed-exitcode must also use
          # set +e, otherwise set -e (GitHub Actions default) kills the shell
          # before $? can be captured.
          FAIL=0
          for file in .github/workflows/deploy.yml .github/workflows/pr-validate.yml; do
            if [ ! -f "$file" ]; then continue; fi
            # Find each line number containing -detailed-exitcode
            grep -n 'detailed-exitcode' "$file" | while IFS=: read -r lineno _; do
              # Check the 5 lines before it in the same run block for set +e
              start=$((lineno > 5 ? lineno - 5 : 1))
              if ! sed -n "${start},${lineno}p" "$file" | grep -q 'set +e'; then
                echo "::error file=${file},line=${lineno}::${file}:${lineno} uses -detailed-exitcode without 'set +e'. Exit code will be lost."
                FAIL=1
              fi
            done
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "Workflow exit code handling OK"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Lambda functions
        run: bash terraform/build.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.DEV_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Cache Terraform
        uses: actions/cache@v5
        with:
          path: |
            ~/.terraform.d/plugin-cache
            terraform/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=backend-dev.hcl

      - name: Terraform plan (no apply)
        id: plan
        working-directory: terraform
        env:
          TF_CLI_ARGS: -no-color
        run: |
          set +e
          terraform plan -input=false -lock-timeout=2m -detailed-exitcode | tee plan.out
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e
          echo "exitcode=$PLAN_EXIT" >> $GITHUB_OUTPUT

      - name: Check for plan failure
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        run: |
          echo "Terraform plan failed with exit code ${{ steps.plan.outputs.exitcode }}"
          exit 1

      - name: Upload plan artifact
        uses: actions/upload-artifact@v6
        with:
          name: terraform-plan
          path: terraform/plan.out

      - name: Post plan summary
        if: always()
        run: |
          echo '### Terraform Plan Summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 200 terraform/plan.out >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          
