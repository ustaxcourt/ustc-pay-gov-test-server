<!doctype html>
<html lang="en">
  <head>
    <title>Test Pay Page</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <h1>This is a test payment page</h1>

    <p><a href="%%urlSuccess%%"
          data-payment-method="PAYPAL"
          data-payment-status="Success">Complete Payment (PayPal - Success)</a></p>

    <p><a href="%%urlSuccess%%"
          data-payment-method="PLASTIC_CARD"
          data-payment-status="Success">Complete Payment (Credit Card - Success)</a></p>

    <p><a href="%%urlSuccess%%"
          data-payment-method="ACH"
          data-payment-status="Success">Complete Payment (ACH - Success)</a></p>

    <p><a href="%%urlSuccess%%"
          data-payment-method="PLASTIC_CARD"
          data-payment-status="Failed">Complete Payment (Credit Card - Failed)</a></p>

    <p><a href="%%urlSuccess%%"
          data-payment-method="ACH"
          data-payment-status="Failed">Complete Payment (ACH - Failed)</a></p>

    <p><a href="%%urlSuccess%%"
          data-payment-method="PAYPAL"
          data-payment-status="Failed">Complete Payment (PayPal - Failed)</a></p>

    <p><a href="%%urlCancel%%">Cancel Payment</a></p>

    <script>
      (function () {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
          document.querySelectorAll("a[data-payment-method][data-payment-status]").forEach((link) => {
            link.addEventListener("click", (event) => {
              event.preventDefault();
              window.alert("No token found — cannot process payment");
            });
          });
          return;
        }

        document.querySelectorAll("a[data-payment-method][data-payment-status]").forEach((link) => {
          link.addEventListener("click", async function (event) {
            event.preventDefault();

            const method = link.getAttribute("data-payment-method");
            const status = link.getAttribute("data-payment-status");

            try {
              const response = await fetch(
                `/pay/${encodeURIComponent(method)}/${encodeURIComponent(status)}?token=${encodeURIComponent(token)}`,
                { method: "POST" }
              );

              if (!response.ok) {
                const message = await response.text();
                window.alert(message || "Unable to process payment");
                return;
              }

              const { redirectUrl } = await response.json();
              window.location.assign(redirectUrl || link.getAttribute("href") || "/");
            } catch (error) {
              console.error("Payment request failed", error);
              window.alert("Unable to process payment");
            }
          });
        });
      })();
    </script>
  </body>
</html>
